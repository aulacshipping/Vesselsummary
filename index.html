<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1050">
<title>Aulac Corporation - Fleet Summary</title>
<style>
  /* GIAO DIỆN GỐC CỦA BẠN */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #ffffff; color: #1e293b; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  #topbar { display: flex; align-items: center; justify-content: space-between; padding: 8px 30px; background: #f8fafc; border-bottom: 3px solid #e2e8f0; }
  .logo svg { width: 130px; height: auto; }
  .section-title { font-size: 22px; font-weight: 700; color: #334155; text-transform: uppercase; display: flex; justify-content: space-between; margin-bottom: 8px; }
  .update-time { font-size: 14px; font-weight: 500; color: #64748b; text-transform: none; }
  table { width: 100%; border-collapse: collapse; }
  thead th { padding: 10px; font-weight: 700; border-bottom: 4px solid #f59e0b; }
  tbody td { padding: 8px; text-align: center; font-size: 20px; font-weight: 600; border-bottom: 1px solid #e2e8f0; }
  .date-urgent { color: #b91c1c; font-weight: 800; }
  .date-soon { color: #ff7300; font-weight: 800; }
  small { display: block; font-size: 13px; font-weight: 700; }
</style>
</head>
<body>

<div id="topbar">
  <div class="logo">
    <svg xmlns="http://www.w3.org/2000/svg" width="140" height="51" viewBox="0 0 140 51" fill="none">
        <path d="M125.849 9.24637C125.466 9.25371 125.437 9.26105 125.047 9.26473C123.731 10.9165 122.08 12.7225 120.242 14.9102C119.223 16.1105 118.536 16.5363 118.536 20.3207V27.1371C118.543 27.7831 119.069 28.3007 119.716 28.3007C120.102 28.3007 120.448 28.1135 120.661 27.8235L133.36 12.6527C133.558 11.9186 132.992 9.12891 125.849 9.2427" fill="#233F84"></path>
    </svg>
  </div>
</div>

<div id="main" style="padding: 10px 30px;">
    <div class="section-title">
      <span>FLEET SUMMARY</span>
      <span class="update-time">Last Updated: 15/06/2026</span>
    </div>
    <table>
      <thead>
        <tr><th>NO.</th><th>VESSEL NAME</th><th>ANNUAL</th><th>DRY-DOCK</th><th>SIRE</th><th>SIRE VALID</th><th>PSC</th><th>RANGE</th></tr>
      </thead>
      <tbody id="fleet-tbody"></tbody>
    </table>
</div>

<script>
const TODAY = new Date(); TODAY.setHours(0,0,0,0);
const API_URL = 'https://script.google.com/macros/s/AKfycbz7yrXEcPgoVN-R8pUmUMZgBdBi9---tvwujpJfvLNS2cjOjtuLHGfaEXVQa-vGEDgYEw/exec';

function parseDate(str) { 
  if (!str) return null;
  const parts = str.toString().split('/');
  return parts.length === 3 ? new Date(parts[2], parts[1]-1, parts[0]) : null;
}
function diffDays(val) { const d = parseDate(val); return d ? Math.round((d - TODAY) / 86400000) : null; }

// LOGIC CẢNH BÁO CỦA BẠN ĐÂY:
function fmtAnnual(val) {
  const days = diffDays(val);
  if (days !== null && days <= 90) return `<span class="date-urgent">${val}<br><small>${days < 0 ? '⚠️ Overdue' : '⏳ Due'} ${Math.abs(days)}d</small></span>`;
  return val || '—';
}
function fmtDrydock(val) {
  const days = diffDays(val);
  if (days !== null && days <= 90) return `<span class="date-soon">${val}<br><small>${days < 0 ? '⚠️ Overdue' : '⏳ Due'} ${Math.abs(days)}d</small></span>`;
  return val || '—';
}
function fmtSireValid(val) {
  const days = diffDays(val);
  if (days !== null && days <= 60) return `<span class="date-urgent">${val}<br><small>${days < 0 ? '⚠️ Overdue' : '⏳ Expires'} ${Math.abs(days)}d</small></span>`;
  return val || '—';
}

async function loadData() {
  const res = await fetch(API_URL);
  const data = await res.json();
  const tbody = document.getElementById('fleet-tbody');
  tbody.innerHTML = data.map(v => `<tr>
    <td>${v.no}</td>
    <td class="vessel-name">${v.name}</td>
    <td>${fmtAnnual(v.annual)}</td>
    <td>${fmtDrydock(v.drydock)}</td>
    <td>${v.sire || '—'}</td>
    <td>${fmtSireValid(v.sireValid)}</td>
    <td>${v.psc || '—'}</td>
    <td>${v.window || '—'}</td>
  </tr>`).join('');
}
loadData();
</script>
</body>
</html>
