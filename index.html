<title>Aulac Corporation - Fleet Summary</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #ffffff; color: #1e293b; height: 100vh; height: 100dvh; width: 100%; display: flex; flex-direction: column; overflow: hidden; -webkit-font-smoothing: antialiased; }

  /* HEADER BÊ NGUYÊN TỪ BẢN CHUẨN */
  #topbar { display: flex; align-items: center; justify-content: space-between; padding: 8px 30px; background: #f8fafc; border-bottom: 3px solid #e2e8f0; flex-shrink: 0; }
  #mode-label { font-size: 18px; font-weight: 800; padding: 6px 20px; border-radius: 50px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); background: #eff6ff; color: #113285; border: 2px solid #bfdbfe; }
  .logo { display: flex; align-items: center; }
  .logo svg { width: 130px; height: auto; }

  /* MAIN & TABLE */
  #main { flex: 1; display: flex; position: relative; overflow: hidden; padding: 10px 30px; }
  #fleet-view { flex: 1; display: flex; flex-direction: column; width: 100%; overflow: hidden; }

  .section-title { font-size: 22px; font-weight: 700; color: #334155; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .update-time { font-size: 14px; font-weight: 500; color: #64748b; text-transform: none; }

  .legend { display: flex; gap: 30px; margin-bottom: 10px; flex-wrap: wrap; font-size: 16px; font-weight: 600; color: #475569; flex-shrink: 0; }
  .legend-item { display: flex; align-items: center; gap: 8px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; }

  table { width: 100%; border-collapse: collapse; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05); border-radius: 8px; overflow: hidden; flex: 1; height: 100%; display: table; }
  thead tr { background: linear-gradient(135deg, #f1f5f9, #e2e8f0); }
  thead th { padding: 10px; text-align: center; vertical-align: middle; font-weight: 700; font-size: 16px; color: #0f172a; border-bottom: 4px solid #f59e0b; line-height: 1.3; }
  tbody tr { height: 12.5%; } 
  tbody td { padding: 6px 10px; text-align: center; border-bottom: 1px solid #e2e8f0; font-size: 20px; font-weight: 600; color: #334155; vertical-align: middle; }
  tbody td.vessel-name { text-align: center; font-weight: 800; color: #0f172a; font-size: 20px; }

  .date-urgent { color: #b91c1c; font-weight: 800; font-size: 20px; }
  .date-soon { color: #ff7300; font-weight: 800; font-size: 20px; } 
  .date-cell { font-size: 20px; color: #334155; }
  .date-empty { color: #94a3b8; font-size: 20px; font-weight: 400; }
  small { display: block; font-size: 13px; margin-top: 2px; font-weight: 700; opacity: 0.9; }

  #footer { display: flex; justify-content: space-between; align-items: center; padding: 10px 30px; font-size: 16px; font-weight: 600; color: #64748b; background: #f8fafc; border-top: 1px solid #e2e8f0; flex-shrink: 0; }
  #footer-clock { color: #0f172a; font-weight: 700; background: #e2e8f0; padding: 5px 15px; border-radius: 6px; letter-spacing: 1px; }
</style>

<div id="main">
  <div id="fleet-view">
    <div class="section-title">
      <span>FLEET SUMMARY</span>
      <span class="update-time">Last Updated: 15/06/2026</span>
    </div>
    
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#b91c1c"></div>Overdue / Urgent</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ff7300"></div>Upcoming / In Range</div>
      <div class="legend-item"><div class="legend-dot" style="background:#94a3b8"></div>Normal</div>
    </div>
    
    <table>
      <thead>
        <tr><th>NO.</th><th>VESSEL NAME</th><th>ANNUAL SURVEY DATE</th><th>DRY-DOCK DATE</th><th>LATEST SIRE</th><th>SIRE VALID</th><th>LATEST PSC</th><th>PSC RANGE</th></tr>
      </thead>
      <tbody id="fleet-tbody"></tbody>
    </table>
  </div>
</div>

<div id="footer">
  <span>Aulac Fleet Management System</span>
  <span id="footer-clock"></span>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbz7yrXEcPgoVN-R8pUmUMZgBdBi9---tvwujpJfvLNS2cjOjtuLHGfaEXVQa-vGEDgYEw/exec'; 
const TODAY = new Date(); TODAY.setHours(0,0,0,0);
const placeholder = `<br><small style="visibility:hidden;">-</small>`;

function parseDate(str) { if (!str) return null; const s = str.toString(); if (s.includes('T')) return new Date(s); if (s.includes('/')) { const [d, m, y] = s.split('/'); return new Date(`${y}-${m}-${d}`); } return null; }
function formatDate(d) { return (d instanceof Date && !isNaN(d)) ? `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}` : "—"; }
function diffDays(val) { const d = (val instanceof Date) ? val : parseDate(val); return d ? Math.round((d - TODAY) / 86400000) : null; }

function fmtAnnual(val) { const d = parseDate(val); const days = diffDays(d); const txt = formatDate(d); if (days !== null && days <= 90) return `<span class="date-urgent">${txt}<br><small>${days < 0 ? '⚠️ Overdue' : '⏳ Due in'} ${Math.abs(days)} days</small></span>`; return `<span class="date-cell">${txt}${placeholder}</span>`; }
function fmtDrydock(val) { const d = parseDate(val); const days = diffDays(d); const txt = formatDate(d); if (days !== null && days <= 90) return `<span class="date-soon">${txt}<br><small>${days < 0 ? '⚠️ Overdue' : '⏳ Due in'} ${Math.abs(days)} days</small></span>`; return `<span class="date-cell">${txt}${placeholder}</span>`; }
function fmtSireValid(val) { const d = parseDate(val); const days = diffDays(d); const txt = formatDate(d); if (days !== null && days <= 60) { const msg = days < 0 ? `⚠️ Overdue by ${Math.abs(days)} days` : `⏳ Expires in ${days} days`; return `<span class="date-urgent">${txt}<br><small>${msg}</small></span>`; } return `<span class="date-cell">${txt}${placeholder}</span>`; }
function fmtDatePlain(val) { return `<span class="date-cell">${formatDate(parseDate(val))}${placeholder}</span>`; }
function fmtPscRange(win) { if (!win) return `<span class="date-empty">—${placeholder}</span>`; const parts = win.split('-'); const start = parseDate(parts[0].trim()); const end = parseDate(parts[1].trim()); const txt = `${formatDate(start)} - ${formatDate(end)}`; if (start && end && TODAY >= start && TODAY <= end) return `<span class="date-soon">${txt}${placeholder}</span>`; return `<span class="date-cell">${txt}${placeholder}</span>`; }

async function loadData() {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();
    document.getElementById('fleet-tbody').innerHTML = data.map(v => `<tr>
      <td>${v.no}</td><td class="vessel-name">${v.name}</td>
      <td>${fmtAnnual(v.annual)}</td><td>${fmtDrydock(v.drydock)}</td>
      <td>${fmtDatePlain(v.sire)}</td><td>${fmtSireValid(v.sireValid)}</td>
      <td>${fmtDatePlain(v.psc)}</td><td>${fmtPscRange(v.window)}</td>
    </tr>`).join('');
  } catch(e) { console.error(e); }
}

loadData(); setInterval(loadData, 60000);
function updateClock() { const n = new Date(); document.getElementById('footer-clock').textContent = `${n.toLocaleDateString('vi-VN')} | ${n.toLocaleTimeString('vi-VN')}`; }
updateClock(); setInterval(updateClock, 1000);
</script>
