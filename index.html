<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1050">
<title>Aulac Corporation - Fleet Summary</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #ffffff; color: #1e293b; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
  #topbar { display: flex; align-items: center; justify-content: space-between; padding: 8px 30px; background: #f8fafc; border-bottom: 3px solid #e2e8f0; flex-shrink: 0; }
  #mode-label { font-size: 18px; font-weight: 800; padding: 6px 20px; border-radius: 50px; background: #eff6ff; color: #113285; border: 2px solid #bfdbfe; }
  .logo { display: flex; align-items: center; }
  .logo svg { width: 130px; height: auto; }
  #main { flex: 1; display: flex; padding: 10px 30px; overflow: hidden; }
  #fleet-view { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .section-title { font-size: 22px; font-weight: 700; color: #334155; text-transform: uppercase; display: flex; justify-content: space-between; margin-bottom: 8px; }
  .legend { display: flex; gap: 30px; margin-bottom: 10px; font-size: 16px; font-weight: 600; color: #475569; }
  .legend-item { display: flex; align-items: center; gap: 8px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; }
  table { width: 100%; border-collapse: collapse; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); border-radius: 8px; overflow: hidden; flex: 1; }
  thead tr { background: linear-gradient(135deg, #f1f5f9, #e2e8f0); }
  thead th { padding: 10px; text-align: center; font-weight: 700; border-bottom: 4px solid #f59e0b; }
  tbody tr { height: 12.5%; }
  tbody td { padding: 6px 10px; text-align: center; border-bottom: 1px solid #e2e8f0; font-size: 20px; font-weight: 600; color: #334155; }
  .vessel-name { font-weight: 800; color: #0f172a; }
  .date-urgent { color: #b91c1c; font-weight: 800; }
  .date-soon { color: #ff7300; font-weight: 800; }
  .date-cell { color: #334155; }
  .date-empty { color: #94a3b8; }
  small { display: block; font-size: 13px; font-weight: 700; }
  #footer { display: flex; justify-content: space-between; padding: 10px 30px; background: #f8fafc; border-top: 1px solid #e2e8f0; }
  #footer-clock { font-weight: 700; background: #e2e8f0; padding: 5px 15px; border-radius: 6px; }
</style>
</head>
<body>

<div id="topbar">
  <div id="mode-label">AULAC CORPORATION - Energy on the move</div>
  <div class="logo">
    </div>
</div>

<div id="main">
  <div id="fleet-view">
    <div class="section-title">
      <span>FLEET SUMMARY</span>
      <span class="update-time" id="last-update"></span>
    </div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#b91c1c"></div>Overdue/Urgent</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ff7300"></div>Upcoming/In Range</div>
    </div>
    <table>
      <thead>
        <tr><th>NO.</th><th>VESSEL NAME</th><th>ANNUAL SURVEY</th><th>DRY-DOCK</th><th>LATEST SIRE</th><th>SIRE VALID</th><th>LATEST PSC</th><th>PSC RANGE</th></tr>
      </thead>
      <tbody id="fleet-tbody"></tbody>
    </table>
  </div>
</div>

<div id="footer">
  <span>Aulac Fleet Management System</span>
  <span id="footer-clock"></span>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbz7yrXEcPgoVN-R8pUmUMZgBdBi9---tvwujpJfvLNS2cjOjtuLHGfaEXVQa-vGEDgYEw/exec'; 
const TODAY = new Date(); TODAY.setHours(0,0,0,0);

function parseDate(str) { 
  if (!str) return null;
  var parts = str.toString().split('/');
  return parts.length === 3 ? new Date(parts[2], parts[1]-1, parts[0]) : new Date(str);
}

function diffDays(val) { 
  const d = parseDate(val); 
  return d ? Math.round((d - TODAY) / 86400000) : null; 
}

function fmtAnnual(val) {
  const d = parseDate(val); const days = diffDays(d);
  if (days !== null && days <= 90) return `<span class="date-urgent">${val}<br><small>${days < 0 ? '⚠️ Overdue' : '⏳ Due'} in ${Math.abs(days)} days</small></span>`;
  return val ? `<span class="date-cell">${val}</span>` : '<span class="date-empty">—</span>';
}

function fmtDrydock(val) {
  const d = parseDate(val); const days = diffDays(d);
  if (days !== null && days <= 90) return `<span class="date-soon">${val}<br><small>${days < 0 ? '⚠️ Overdue' : '⏳ Due'} in ${Math.abs(days)} days</small></span>`;
  return val ? `<span class="date-cell">${val}</span>` : '<span class="date-empty">—</span>';
}

function fmtSireValid(val) {
  const d = parseDate(val); const days = diffDays(d);
  if (days !== null && days <= 60) {
    const msg = days < 0 ? `⚠️ Overdue ${Math.abs(days)}d` : `⏳ Expires in ${days}d`;
    return `<span class="date-urgent">${val}<br><small>${msg}</small></span>`;
  }
  return val ? `<span class="date-cell">${val}</span>` : '<span class="date-empty">—</span>';
}

async function loadData() {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();
    const tbody = document.getElementById('fleet-tbody');
    tbody.innerHTML = '';
    data.forEach(v => {
      tbody.innerHTML += `<tr>
        <td>${v.no}</td>
        <td class="vessel-name">${v.name}</td>
        <td>${fmtAnnual(v.annual)}</td>
        <td>${fmtDrydock(v.drydock)}</td>
        <td><span class="date-cell">${v.sire || '—'}</span></td>
        <td>${fmtSireValid(v.sireValid)}</td>
        <td><span class="date-cell">${v.psc || '—'}</span></td>
        <td><span class="date-cell">${v.window || '—'}</span></td>
      </tr>`;
    });
    document.getElementById('last-update').textContent = "Last Updated: " + new Date().toLocaleTimeString('vi-VN');
  } catch (e) { console.error(e); }
}

loadData(); setInterval(loadData, 60000);
function updateClock() { document.getElementById('footer-clock').textContent = new Date().toLocaleString('vi-VN'); }
updateClock(); setInterval(updateClock, 1000);
</script>
</body>
</html>
